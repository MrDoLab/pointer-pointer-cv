<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pointer Pointer Vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            color: #fff;
            overflow: hidden;
            cursor: none;
            height: 100vh;
            width: 100vw;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        #image-display {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            border-radius: 0;
            box-shadow: none;
            transition: opacity 0.3s ease;
        }

        #image-display.fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }

        #info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 12px;
            color: #aaa;
        }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 히트맵 모달 */
        #heatmap-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        #heatmap-modal.active {
            display: flex;
        }

        #heatmap-content {
            max-width: 90vw;
            max-height: 90vh;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            position: relative;
        }

        #heatmap-image {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 5px;
        }

        #heatmap-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        #heatmap-close:hover {
            background: #5568d3;
        }

        #heatmap-info {
            margin-top: 10px;
            color: #aaa;
            font-size: 12px;
            text-align: center;
        }

        /* 히트맵 오버레이 */
        #heatmap-overlay {
            opacity: 1;
            mix-blend-mode: normal;
            z-index: 10;
        }

        #heatmapToggleBtn.active {
            background: #ff4444;
        }

        #heatmapToggleBtn.active:hover {
            background: #cc3333;
        }

        #webcamToggleBtn.active {
            background: #44ff44;
        }

        #webcamToggleBtn.active:hover {
            background: #33cc33;
        }

        #captureBtn {
            background: #ff6677;
        }

        #captureBtn:hover {
            background: #ff4455;
        }

        #captureBtn:disabled {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    
    <div id="controls">
        <button id="processBtn">이미지 처리 시작</button>
        <button id="reloadBtn" disabled>새로고침</button>
        <button id="heatmapToggleBtn" disabled>히트맵 ON/OFF</button>
        <button id="datasetBtn" disabled>데이터셋</button>
        <button id="webcamToggleBtn">웹캠 켜기</button>
        <button id="captureBtn" disabled>📷 캡처</button>
        <div id="status">준비됨</div>
    </div>

    <div id="container">
        <div style="position: relative; display: inline-block;">
            <img id="image-display" src="" alt="손 이미지" style="display: none;">
            <canvas id="heatmap-overlay" style="position: absolute; top: 0; left: 0; pointer-events: none; display: none;"></canvas>
        </div>
        <div id="loading" style="display: none;">
            <div class="loading"></div>
        </div>
        <!-- 웹캠 비디오 (표시) -->
        <video id="webcam-video" autoplay playsinline style="position: fixed; top: 20px; right: 20px; width: 320px; height: 240px; border: 2px solid #667eea; border-radius: 10px; display: none; z-index: 100;"></video>
        <canvas id="webcam-canvas" style="display: none;"></canvas>
        
        <!-- 세그먼트 이미지 오버레이 -->
        <img id="segment-overlay" style="position: fixed; pointer-events: none; z-index: 50; display: none;" alt="세그먼트 오버레이">
    </div>

    <div id="info">
        <div>마우스를 움직여보세요</div>
        <div id="match-info" style="margin-top: 5px;"></div>
    </div>

    <!-- 히트맵 모달 -->
    <div id="heatmap-modal">
        <div id="heatmap-content">
            <button id="heatmap-close">닫기</button>
            <img id="heatmap-image" src="" alt="히트맵">
            <div id="heatmap-info">데이터셋: 모든 손가락 위치와 마우스 좌표를 표시합니다</div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let isProcessing = false;
        let currentImage = null;
        let currentImageCoords = null; // 현재 이미지의 손가락 좌표 저장
        let heatmapEnabled = false;
        let heatmapCanvas = null;
        let heatmapCtx = null;
        let currentMouseX = window.innerWidth / 2;
        let currentMouseY = window.innerHeight / 2;
        
        // 웹캠 관련 변수
        let webcamStream = null;
        let webcamEnabled = false;
        let webcamVideo = null;
        let webcamCanvas = null;
        let webcamCtx = null;

        // 히트맵 오버레이 초기화
        heatmapCanvas = document.getElementById('heatmap-overlay');
        heatmapCtx = heatmapCanvas.getContext('2d');
        
        // 웹캠 초기화
        webcamVideo = document.getElementById('webcam-video');
        webcamCanvas = document.getElementById('webcam-canvas');
        webcamCtx = webcamCanvas.getContext('2d');
        
        // 세그먼트 오버레이 초기화
        segmentOverlay = document.getElementById('segment-overlay');
        if (!segmentOverlay) {
            console.error('[ERROR] segment-overlay 요소를 찾을 수 없습니다');
        }
        
        // 세그먼트 오버레이 초기화
        segmentOverlay = document.getElementById('segment-overlay');

        // 커서 스타일
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            currentMouseX = e.clientX;
            currentMouseY = e.clientY;
        });

        // 이미지 처리 버튼
        document.getElementById('processBtn').addEventListener('click', async () => {
            if (isProcessing) {
                return;
            }
            
            isProcessing = true;
            const btn = document.getElementById('processBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '처리 중...';
            status.textContent = '이미지 처리 중...';
            
            try {
                const response = await fetch(`${API_BASE}/api/process-images`, {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    console.error(`[ERROR] 이미지 처리 API 실패: ${response.status}`);
                    const errorText = await response.text();
                    console.error(`[ERROR] 응답 내용:`, errorText);
                    status.textContent = `처리 실패: ${response.status}`;
                    return;
                }
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    status.textContent = `처리 완료: ${data.processed}개 성공, ${data.failed}개 실패`;
                    document.getElementById('reloadBtn').disabled = false;
                    document.getElementById('heatmapToggleBtn').disabled = false;
                    document.getElementById('datasetBtn').disabled = false;
                    
                    // 처리 완료 후 첫 번째 매칭 시도
                    await findMatch(window.innerWidth / 2, window.innerHeight / 2);
                } else {
                    console.error(`[ERROR] 처리 실패:`, data);
                    status.textContent = '처리 실패';
                }
            } catch (error) {
                console.error('[ERROR] 이미지 처리 에러:', error);
                status.textContent = '에러 발생: ' + error.message;
            } finally {
                isProcessing = false;
                btn.disabled = false;
                btn.textContent = '이미지 처리 시작';
            }
        });

        // 새로고침 버튼
        document.getElementById('reloadBtn').addEventListener('click', async () => {
            await findMatch(window.innerWidth / 2, window.innerHeight / 2);
        });

        // 히트맵 토글 버튼
        document.getElementById('heatmapToggleBtn').addEventListener('click', () => {
            heatmapEnabled = !heatmapEnabled;
            const btn = document.getElementById('heatmapToggleBtn');
            const overlay = document.getElementById('heatmap-overlay');
            
            if (heatmapEnabled) {
                btn.classList.add('active');
                btn.textContent = '히트맵 OFF';
                overlay.style.display = 'block';
                updateHeatmapOverlay();
            } else {
                btn.classList.remove('active');
                btn.textContent = '히트맵 ON/OFF';
                overlay.style.display = 'none';
            }
        });

        // 히트맵 오버레이 업데이트 함수 - 현재 이미지의 손가락 위치를 중심으로 가우시안 분포 그리기
        function updateHeatmapOverlay() {
            if (!heatmapEnabled) {
                return;
            }
            
            if (!currentImage || !currentImageCoords) {
                return;
            }
            
            const imgDisplay = document.getElementById('image-display');
            if (!imgDisplay.complete) {
                return;
            }
            
            if (imgDisplay.style.display === 'none') {
                return;
            }
            
            try {
                // 전체 화면 크기 사용
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                // Canvas 크기 설정 (전체 화면)
                heatmapCanvas.width = width;
                heatmapCanvas.height = height;
                heatmapCanvas.style.width = width + 'px';
                heatmapCanvas.style.height = height + 'px';
                
                // Canvas 초기화
                heatmapCtx.clearRect(0, 0, width, height);
                
                // 현재 이미지의 손가락 좌표 (이미지 내부 좌표)
                const fingerX = currentImageCoords.x;
                const fingerY = currentImageCoords.y;
                const confidence = currentImageCoords.confidence || 0.8;
                
                // 이미지가 화면에 표시되는 실제 크기와 위치 계산
                const imgRect = imgDisplay.getBoundingClientRect();
                const imgNaturalWidth = imgDisplay.naturalWidth;
                const imgNaturalHeight = imgDisplay.naturalHeight;
                
                // 이미지가 화면에 맞춰 스케일된 비율 계산
                const scaleX = imgRect.width / imgNaturalWidth;
                const scaleY = imgRect.height / imgNaturalHeight;
                
                // 손가락 위치를 화면 좌표로 변환
                const screenX = imgRect.left + (fingerX * scaleX);
                const screenY = imgRect.top + (fingerY * scaleY);
                
                // 실제 가우시안 분포 계산 파라미터
                const sigma = Math.max(imgRect.width, imgRect.height) * 0.15; // 표준편차 (이미지 크기의 15%)
                const maxRadius = sigma * 2; // 2시그마 범위 (95.4% 커버)
                
                // 이미지 영역을 덮을 수 있도록 충분히 큰 반경 사용
                const effectiveRadius = Math.max(maxRadius, Math.max(imgRect.width, imgRect.height) * 0.4);
                
                // 실제 가우시안 분포를 계산하여 그리기
                // 각 픽셀마다 거리를 계산하고 가우시안 함수 적용
                const imageData = heatmapCtx.createImageData(width, height);
                const data = imageData.data;
                
                // 가우시안 함수: f(x) = exp(-(x^2) / (2 * sigma^2))
                const twoSigmaSquared = 2 * sigma * sigma;
                
                // 이미지 영역 내의 픽셀들에 대해 가우시안 분포 계산
                const startX = Math.max(0, Math.floor(screenX - effectiveRadius));
                const endX = Math.min(width, Math.ceil(screenX + effectiveRadius));
                const startY = Math.max(0, Math.floor(screenY - effectiveRadius));
                const endY = Math.min(height, Math.ceil(screenY + effectiveRadius));
                
                let maxGaussianValue = 0;
                const gaussianValues = [];
                
                // 1단계: 가우시안 값 계산
                for (let y = startY; y < endY; y++) {
                    for (let x = startX; x < endX; x++) {
                        const dx = x - screenX;
                        const dy = y - screenY;
                        const distanceSquared = dx * dx + dy * dy;
                        
                        // 가우시안 함수 계산
                        const gaussianValue = Math.exp(-distanceSquared / twoSigmaSquared);
                        gaussianValues.push({ x, y, value: gaussianValue });
                        
                        if (gaussianValue > maxGaussianValue) {
                            maxGaussianValue = gaussianValue;
                        }
                    }
                }
                
                // 2단계: 계산된 가우시안 값을 이미지 데이터에 적용
                gaussianValues.forEach(({ x, y, value }) => {
                    // 정규화 (0~1 범위)
                    const normalizedValue = value / maxGaussianValue;
                    
                    // 신뢰도와 결합하여 최종 투명도 계산
                    const alpha = normalizedValue * (0.8 * confidence + 0.2);
                    
                    // 빨간색 계열로 색상 설정 (가우시안 값에 따라 강도 조절)
                    const redIntensity = Math.floor(255 * (1 - normalizedValue * 0.3)); // 중심이 더 밝게
                    const greenIntensity = Math.floor(50 * (1 - normalizedValue * 0.8));
                    const blueIntensity = Math.floor(50 * (1 - normalizedValue * 0.8));
                    
                    const index = (y * width + x) * 4;
                    data[index] = redIntensity;     // R
                    data[index + 1] = greenIntensity; // G
                    data[index + 2] = blueIntensity;  // B
                    data[index + 3] = Math.floor(alpha * 255); // A (투명도)
                });
                
                // 3단계: 계산된 이미지 데이터를 Canvas에 그리기
                heatmapCtx.putImageData(imageData, 0, 0);
                
                // 중심점 표시 (빨간 점 - 실제 손가락 위치)
                heatmapCtx.fillStyle = 'rgba(255, 0, 0, 1)';
                heatmapCtx.beginPath();
                heatmapCtx.arc(screenX, screenY, 5, 0, Math.PI * 2);
                heatmapCtx.fill();
                
                // 중심점 테두리 (흰색 - 범위 표시용)
                heatmapCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                heatmapCtx.lineWidth = 2;
                heatmapCtx.beginPath();
                heatmapCtx.arc(screenX, screenY, 5, 0, Math.PI * 2);
                heatmapCtx.stroke();
                
            } catch (error) {
                console.error('[ERROR] 히트맵 오버레이 에러:', error);
            }
        }

        // 데이터셋 히트맵 버튼 (이미지 좌표와 마우스 좌표를 고려)
        document.getElementById('datasetBtn').addEventListener('click', async () => {
            const modal = document.getElementById('heatmap-modal');
            const heatmapImage = document.getElementById('heatmap-image');
            const heatmapInfo = document.getElementById('heatmap-info');
            
            try {
                // 현재 이미지 정보 가져오기
                const imgDisplay = document.getElementById('image-display');
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                // 현재 마우스 위치
                const mouseX = currentMouseX;
                const mouseY = currentMouseY;
                
                // 이미지가 표시되는 실제 크기와 위치 계산
                let imgRect = null;
                let imgNaturalWidth = 0;
                let imgNaturalHeight = 0;
                let scaleX = 1;
                let scaleY = 1;
                
                if (imgDisplay.complete && imgDisplay.style.display !== 'none') {
                    imgRect = imgDisplay.getBoundingClientRect();
                    imgNaturalWidth = imgDisplay.naturalWidth;
                    imgNaturalHeight = imgDisplay.naturalHeight;
                    scaleX = imgNaturalWidth / imgRect.width;
                    scaleY = imgNaturalHeight / imgRect.height;
                }
                
                // 마우스 좌표를 이미지 좌표로 변환 (있는 경우)
                let transformedMouseX = mouseX;
                let transformedMouseY = mouseY;
                
                if (imgRect && imgNaturalWidth > 0 && imgNaturalHeight > 0) {
                    const imgRelativeX = (mouseX - imgRect.left) * scaleX;
                    const imgRelativeY = (mouseY - imgRect.top) * scaleY;
                    
                    if (imgRelativeX >= 0 && imgRelativeX < imgNaturalWidth && 
                        imgRelativeY >= 0 && imgRelativeY < imgNaturalHeight) {
                        transformedMouseX = imgRelativeX;
                        transformedMouseY = imgRelativeY;
                    }
                }
                
                // 데이터셋 히트맵 요청 (이미지 좌표와 마우스 좌표 포함)
                const response = await fetch(`${API_BASE}/api/get-dataset-heatmap?width=${width}&height=${height}&mouse_x=${transformedMouseX}&mouse_y=${transformedMouseY}&img_width=${imgNaturalWidth}&img_height=${imgNaturalHeight}&img_display_width=${imgRect ? imgRect.width : 0}&img_display_height=${imgRect ? imgRect.height : 0}&img_left=${imgRect ? imgRect.left : 0}&img_top=${imgRect ? imgRect.top : 0}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    heatmapImage.src = data.heatmap;
                    heatmapInfo.textContent = `데이터셋: ${data.point_count}개 손가락 위치 표시 | 마우스: 화면(${Math.round(mouseX)}, ${Math.round(mouseY)}) 이미지(${Math.round(transformedMouseX)}, ${Math.round(transformedMouseY)})`;
                    modal.classList.add('active');
                } else {
                    alert('데이터셋 히트맵을 불러올 수 없습니다.');
                }
            } catch (error) {
                console.error('데이터셋 히트맵 에러:', error);
                alert('데이터셋 히트맵을 불러오는 중 오류가 발생했습니다.');
            }
        });

        // 히트맵 닫기 버튼
        document.getElementById('heatmap-close').addEventListener('click', () => {
            document.getElementById('heatmap-modal').classList.remove('active');
        });

        // 웹캠 켜기/끄기 버튼
        document.getElementById('webcamToggleBtn').addEventListener('click', async () => {
            if (webcamEnabled) {
                // 웹캠 끄기
                if (webcamStream) {
                    webcamStream.getTracks().forEach(track => track.stop());
                    webcamStream = null;
                }
                webcamVideo.srcObject = null;
                webcamEnabled = false;
                document.getElementById('webcamToggleBtn').textContent = '웹캠 켜기';
                document.getElementById('webcamToggleBtn').classList.remove('active');
                document.getElementById('captureBtn').disabled = true;
                // 웹캠 비디오 숨김
                webcamVideo.style.display = 'none';
            } else {
                // 웹캠 켜기
                try {
                    webcamStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        } 
                    });
                    webcamVideo.srcObject = webcamStream;
                    webcamEnabled = true;
                    document.getElementById('webcamToggleBtn').textContent = '웹캠 끄기';
                    document.getElementById('webcamToggleBtn').classList.add('active');
                    document.getElementById('captureBtn').disabled = false;
                    // 웹캠 비디오 표시
                    webcamVideo.style.display = 'block';
                    
                    // Canvas 크기 설정 (비디오 메타데이터 로드 후)
                    webcamVideo.addEventListener('loadedmetadata', () => {
                        webcamCanvas.width = webcamVideo.videoWidth;
                        webcamCanvas.height = webcamVideo.videoHeight;
                    }, { once: true }); // 한 번만 실행되도록
                } catch (error) {
                    console.error('[ERROR] 웹캠 접근 실패:', error);
                    alert('웹캠에 접근할 수 없습니다. 브라우저 권한을 확인하세요.');
                }
            }
        });

        // 캡처 버튼
        document.getElementById('captureBtn').addEventListener('click', async () => {
            if (!webcamEnabled || !webcamStream) {
                alert('웹캠을 먼저 켜주세요.');
                return;
            }
            
            try {
                // Canvas 크기가 설정되지 않았으면 설정
                if (webcamCanvas.width === 0 || webcamCanvas.height === 0) {
                    webcamCanvas.width = webcamVideo.videoWidth;
                    webcamCanvas.height = webcamVideo.videoHeight;
                }
                
                // 현재 프레임을 Canvas에 그리기
                webcamCtx.drawImage(webcamVideo, 0, 0, webcamCanvas.width, webcamCanvas.height);
                
                // Canvas를 base64로 변환
                const imageBase64 = webcamCanvas.toDataURL('image/jpeg', 0.9);
                
                // 세그먼트 저장 요청
                const response = await fetch(`${API_BASE}/api/save-segment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        camera_image: imageBase64
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[ERROR] 세그먼트 저장 실패:', errorText);
                    alert('세그먼트 저장 실패: ' + errorText);
                    return;
                }
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    // 세그먼트 이미지 저장 (이전 것은 덮어씌워짐)
                    currentSegmentImage = data.segment_image;
                    
                    // 현재 손 이미지가 있으면 세그먼트 오버레이 표시
                    if (currentImage && currentImageCoords) {
                        setTimeout(() => {
                            updateSegmentOverlay();
                        }, 100);
                    } else {
                        alert('세그먼트 저장 완료! 이제 화면을 클릭하면 세그먼트 이미지가 표시됩니다.');
                    }
                } else {
                    alert('세그먼트 저장 실패');
                }
            } catch (error) {
                console.error('[ERROR] 캡처 및 세그먼트 에러:', error);
                alert('에러 발생: ' + error.message);
            }
        });

        // 모달 배경 클릭 시 닫기
        document.getElementById('heatmap-modal').addEventListener('click', (e) => {
            if (e.target.id === 'heatmap-modal') {
                document.getElementById('heatmap-modal').classList.remove('active');
            }
        });

        // 마우스 움직임 감지 (커서 위치만 업데이트)
        document.addEventListener('mousemove', (e) => {
            currentMouseX = e.clientX;
            currentMouseY = e.clientY;
        });

        // 클릭 이벤트로 이미지 매칭
        document.addEventListener('click', (e) => {
            // 히트맵 모달이 열려있으면 클릭 무시
            const modal = document.getElementById('heatmap-modal');
            if (modal.classList.contains('active')) {
                return;
            }
            
            // 컨트롤 영역 클릭 무시
            const controls = document.getElementById('controls');
            if (controls.contains(e.target)) {
                return;
            }
            
            findMatch(e.clientX, e.clientY);
            
            // 히트맵 오버레이 업데이트
            if (heatmapEnabled) {
                updateHeatmapOverlay();
            }
        });

        // 가장 가까운 이미지 찾기
        async function findMatch(x, y) {
            try {
                // 이미지가 표시되는 실제 크기와 위치를 고려하여 좌표 변환
                const imgDisplay = document.getElementById('image-display');
                let transformedX = x;
                let transformedY = y;
                
                // 이미지가 로드되어 있고 표시 중이면 좌표 변환
                if (imgDisplay.complete && imgDisplay.style.display !== 'none') {
                    const imgRect = imgDisplay.getBoundingClientRect();
                    const imgNaturalWidth = imgDisplay.naturalWidth;
                    const imgNaturalHeight = imgDisplay.naturalHeight;
                    
                    // 이미지가 화면에 맞춰 스케일된 비율 계산
                    const scaleX = imgNaturalWidth / imgRect.width;
                    const scaleY = imgNaturalHeight / imgRect.height;
                    
                    // 마우스 좌표를 이미지 내부 좌표로 변환
                    const imgRelativeX = (x - imgRect.left) * scaleX;
                    const imgRelativeY = (y - imgRect.top) * scaleY;
                    
                    // 이미지 영역 내에 있는지 확인
                    if (imgRelativeX >= 0 && imgRelativeX < imgNaturalWidth && 
                        imgRelativeY >= 0 && imgRelativeY < imgNaturalHeight) {
                        transformedX = imgRelativeX;
                        transformedY = imgRelativeY;
                    }
                }
                
                const response = await fetch(`${API_BASE}/api/find-match?x=${transformedX}&y=${transformedY}`, {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    console.error(`[ERROR] API 응답 실패: ${response.status} ${response.statusText}`);
                    const errorText = await response.text();
                    console.error(`[ERROR] 응답 내용:`, errorText);
                    return;
                }
                
                const data = await response.json();
                
                if (data.status === 'success' && data.best_match) {
                    const match = data.best_match;
                    const imgPath = `/static/images/${match.image}`;
                    
                    // 현재 이미지의 좌표 저장
                    currentImageCoords = match.coords;
                    
                    // 이미지 변경
                    if (currentImage !== imgPath) {
                        const imgDisplay = document.getElementById('image-display');
                        
                        // 이미지 로드 전에 src 설정
                        imgDisplay.src = imgPath;
                        imgDisplay.style.display = 'block';
                        imgDisplay.classList.add('fade-in');
                        
                        // 이미지 로드 완료 대기
                        if (imgDisplay.complete) {
                            setTimeout(() => {
                                if (heatmapEnabled) {
                                    updateHeatmapOverlay();
                                }
                                updateSegmentOverlay();
                            }, 100);
                        } else {
                            imgDisplay.onload = () => {
                                setTimeout(() => {
                                    if (heatmapEnabled) {
                                        updateHeatmapOverlay();
                                    }
                                    updateSegmentOverlay();
                                }, 100);
                            };
                            
                            imgDisplay.onerror = () => {
                                console.error(`[ERROR] 이미지 로드 실패: ${imgPath}`);
                                document.getElementById('match-info').textContent = 
                                    `이미지 로드 실패: ${match.image}`;
                            };
                        }
                        
                        // 애니메이션 후 클래스 제거
                        setTimeout(() => {
                            imgDisplay.classList.remove('fade-in');
                        }, 300);
                        
                        currentImage = imgPath;
                    } else {
                        setTimeout(() => {
                            if (heatmapEnabled) {
                                updateHeatmapOverlay();
                            }
                            updateSegmentOverlay();
                        }, 100);
                    }
                    
                    // 정보 업데이트
                    document.getElementById('match-info').textContent = 
                        `거리: ${Math.round(match.distance)}px | ${match.image}`;
                } else {
                    if (data.status !== 'success') {
                        document.getElementById('match-info').textContent = 
                            `매칭 실패: ${data.detail || '알 수 없는 오류'}`;
                    }
                }
            } catch (error) {
                console.error('[ERROR] 매칭 에러:', error);
                document.getElementById('match-info').textContent = 
                    `에러: ${error.message}`;
            }
        }

        // 세그먼트 오버레이 업데이트 함수
        function updateSegmentOverlay() {
            if (!currentSegmentImage || !currentImage || !currentImageCoords) {
                // 세그먼트 이미지가 없으면 오버레이 숨김
                if (segmentOverlay) {
                    segmentOverlay.style.display = 'none';
                }
                return;
            }
            
            if (!segmentOverlay) {
                console.error('[ERROR] segmentOverlay 요소를 찾을 수 없습니다');
                return;
            }
            
            const imgDisplay = document.getElementById('image-display');
            if (!imgDisplay || !imgDisplay.complete || imgDisplay.style.display === 'none') {
                segmentOverlay.style.display = 'none';
                return;
            }
            
            try {
                // 이미지가 화면에 표시되는 실제 크기와 위치 계산
                const imgRect = imgDisplay.getBoundingClientRect();
                const imgNaturalWidth = imgDisplay.naturalWidth;
                const imgNaturalHeight = imgDisplay.naturalHeight;
                
                // 이미지가 화면에 맞춰 스케일된 비율 계산
                const scaleX = imgRect.width / imgNaturalWidth;
                const scaleY = imgRect.height / imgNaturalHeight;
                
                // 손가락 위치를 화면 좌표로 변환
                const fingerX = currentImageCoords.x;
                const fingerY = currentImageCoords.y;
                const screenX = imgRect.left + (fingerX * scaleX);
                const screenY = imgRect.top + (fingerY * scaleY);
                
                // 세그먼트 이미지 로드
                segmentOverlay.src = currentSegmentImage;
                segmentOverlay.style.display = 'block';
                
                // 세그먼트 이미지 크기 설정 (적절한 크기로 조절)
                const baseSize = Math.max(imgRect.width, imgRect.height) * 0.4; // 이미지 크기의 40%
                
                // 이미지 로드 후 실제 크기에 맞춰 조절
                const adjustOverlayPosition = () => {
                    const naturalWidth = segmentOverlay.naturalWidth;
                    const naturalHeight = segmentOverlay.naturalHeight;
                    
                    if (naturalWidth > 0 && naturalHeight > 0) {
                        // 종횡비 유지하면서 크기 조절
                        const aspectRatio = naturalWidth / naturalHeight;
                        let finalWidth = baseSize;
                        let finalHeight = baseSize / aspectRatio;
                        
                        // 최대 크기 제한
                        const maxSize = Math.max(imgRect.width, imgRect.height) * 0.6;
                        if (finalWidth > maxSize) {
                            finalWidth = maxSize;
                            finalHeight = maxSize / aspectRatio;
                        }
                        
                        segmentOverlay.style.width = finalWidth + 'px';
                        segmentOverlay.style.height = finalHeight + 'px';
                        
                        // 손가락 위치를 중심으로 배치
                        const leftPos = screenX - finalWidth / 2;
                        const topPos = screenY - finalHeight / 2;
                        segmentOverlay.style.left = leftPos + 'px';
                        segmentOverlay.style.top = topPos + 'px';
                    } else {
                        // 이미지 크기를 알 수 없으면 기본 크기 사용
                        segmentOverlay.style.width = baseSize + 'px';
                        segmentOverlay.style.height = baseSize + 'px';
                        segmentOverlay.style.left = (screenX - baseSize / 2) + 'px';
                        segmentOverlay.style.top = (screenY - baseSize / 2) + 'px';
                    }
                };
                
                // 이미지 로드 이벤트 리스너 추가
                segmentOverlay.onload = adjustOverlayPosition;
                segmentOverlay.onerror = () => {
                    console.error('[ERROR] 세그먼트 이미지 로드 실패');
                    segmentOverlay.style.display = 'none';
                };
                
                // 이미지가 이미 로드되어 있으면 즉시 위치 조정
                if (segmentOverlay.complete && segmentOverlay.naturalWidth > 0) {
                    adjustOverlayPosition();
                }
            } catch (error) {
                console.error('[ERROR] 세그먼트 오버레이 업데이트 에러:', error);
                segmentOverlay.style.display = 'none';
            }
        }

        // 페이지 로드 시 좌표 데이터 확인
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/api/coords`);
                
                if (!response.ok) {
                    return;
                }
                
                const data = await response.json();
                
                if (data.count > 0) {
                    document.getElementById('status').textContent = 
                        `이미 처리됨: ${data.count}개 이미지`;
                    document.getElementById('reloadBtn').disabled = false;
                    document.getElementById('heatmapToggleBtn').disabled = false;
                    document.getElementById('datasetBtn').disabled = false;
                    
                    // 중앙에서 시작
                    await findMatch(window.innerWidth / 2, window.innerHeight / 2);
                }
            } catch (error) {
                console.error('[ERROR] 초기화 에러:', error);
            }
        });
    </script>
</body>
</html>
